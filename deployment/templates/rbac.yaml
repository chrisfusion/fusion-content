{{- if .Values.auth.enabled }}
---
# ClusterRole + binding — allows the server SA to call the TokenReview API.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "fusion-content.serverSAName" . }}-tokenreview
  labels:
    {{- include "fusion-content.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "fusion-content.serverSAName" . }}-tokenreview
  labels:
    {{- include "fusion-content.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "fusion-content.serverSAName" . }}-tokenreview
subjects:
  - kind: ServiceAccount
    name: {{ include "fusion-content.serverSAName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
