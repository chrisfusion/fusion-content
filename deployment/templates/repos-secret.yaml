{{- if not .Values.repos.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-repos
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fusion-content.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
stringData:
  repos.yaml: |
    repos:
    {{- range .Values.repos.sources }}
      - name: {{ .name | quote }}
        url: {{ .url | quote }}
        token: {{ .token | default "" | quote }}
        changelogPath: {{ .changelogPath | default "CHANGELOG.md" | quote }}
    {{- end }}
    {{- with .Values.help }}
    {{- if .url }}
    help:
      url: {{ .url | quote }}
      token: {{ .token | default "" | quote }}
      dir: {{ .dir | default "help" | quote }}
    {{- end }}
    {{- end }}
    {{- with .Values.videos }}
    {{- if .url }}
    videos:
      url: {{ .url | quote }}
      token: {{ .token | default "" | quote }}
      dir: {{ .dir | default "videos" | quote }}
    {{- end }}
    {{- end }}
{{- end }}
